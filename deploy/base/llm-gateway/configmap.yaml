apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: karyaquest-services
  labels:
    app.kubernetes.io/name: llm-gateway
data:
  LLM_PROVIDER: "fake"
  LLM_MODEL: "fake-model"
  LLM_MODEL_VERSION: "fake-v1"
  LLM_TEMPERATURE: "0.2"
  LLM_MAX_OUTPUT_TOKENS: "1024"
  LLM_REQUEST_TIMEOUT_SECONDS: "30"
  LLM_MAX_RETRIES: "2"
  LLM_LOG_LEVEL: "INFO"
