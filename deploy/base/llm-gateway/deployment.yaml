apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: karyaquest-services
  labels:
    app.kubernetes.io/name: llm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llm-gateway
          image: karyaquest/llm-gateway@sha256:850fe8c96f84af637ad13b6b75b12b89b96da4bf1e71a76886075fd13ad9bb8f
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-gateway-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          startupProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
