apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: karyaquest-services
  labels:
    app.kubernetes.io/name: llm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llm-gateway
          image: karyaquest/llm-gateway@sha256:403903ca7b2ac809036cda4e1ef47d47b77f6bfb1854e30cce79a9ddcf5e73ef
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-gateway-config
          env:
            - name: LLM_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-openai
                  key: LLM_OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          startupProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
