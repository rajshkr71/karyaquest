apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: llm-gateway-config
    namespace: karyaquest-services
    literals:
      - LLM_PROVIDER=openai
      - LLM_MODEL=gpt-5.6-luna
      - LLM_MODEL_VERSION=gpt-5.6-luna
      - LLM_TEMPERATURE=0.2
      - LLM_MAX_OUTPUT_TOKENS=1024
      - LLM_REQUEST_TIMEOUT_SECONDS=30
      - LLM_MAX_RETRIES=2
      - LLM_LOG_LEVEL=INFO

generatorOptions:
  labels:
    app.kubernetes.io/name: llm-gateway
