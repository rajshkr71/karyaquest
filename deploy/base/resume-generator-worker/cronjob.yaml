apiVersion: batch/v1
kind: CronJob
metadata:
  name: resume-generator-worker
  namespace: karyaquest-services
  labels:
    app.kubernetes.io/name: resume-generator-worker
spec:
  schedule: "*/5 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: resume-generator-worker
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: resume-generator-worker
        spec:
          serviceAccountName: resume-generator-worker
          restartPolicy: Never
          containers:
            - name: resume-generator-worker
              image: karyaquest/resume-generator-worker@sha256:156ed501571b40f25bf03292dc803c3731c9e49fcf881d0b4c78bed873c33650
              imagePullPolicy: IfNotPresent
              env:
                - name: AGENT_API_URL
                  value: http://agent-api:8000
                - name: LLM_GATEWAY_URL
                  value: http://llm-gateway:8000
                - name: LLM_GATEWAY_PROVIDER
                  value: openai
                - name: LLM_GATEWAY_MODEL
                  value: gpt-5.6-luna
                - name: LLM_GATEWAY_TIMEOUT_SECONDS
                  value: "30"
