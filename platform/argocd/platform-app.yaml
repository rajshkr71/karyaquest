apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karyaquest-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:rajshkr71/karyaquest.git
    targetRevision: main
    path: platform/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
