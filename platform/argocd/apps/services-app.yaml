apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karyaquest-services
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:rajshkr71/karyaquest.git
    targetRevision: main
    path: deploy/overlays/local/services
  destination:
    server: https://kubernetes.default.svc
    namespace: karyaquest-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
